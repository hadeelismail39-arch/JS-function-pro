<!DOCTYPE html>
<html lang="en">

<body>
 
    <button onclick="myfunction(5)">Execute JS function</button>


    <script>
        function myfunction(x, y)

        {
            if (y== undefined) {
                y = 4;
            }
            document.write(x*y);
        }
    
    </script>

    <p>A funtion can access variables defined inside the function:</p>
        <button type="button" onclick="myfunction()">Click me!</button>
        <p id="demo"></p>
        <p id="demo1"></p>
    <script>
    
             var b = 5;
        function myFunction() {
            var a = 4;
            document.getElementById("demo").innerHTML = b * a;
        }
        document.getElementById("demo1").innerHTML = a;
        document.getElementById("demo2").innerHTML = b;
    </script>
    
        <center>
            <h1 style="color:gray">Basic Operation</h1>

        document.write(result(5,6));

</body>
